<svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg" class="stretching-mannequin">
  <style>
    .joint { fill: #555; }
    .limb { fill: #ddd; stroke: #999; stroke-width: 2; }
    
    /* Shoulder Roll Logic: Moving both arm groups in a circle */
    .animate-shoulders {
      animation: shoulder-roll 3s linear infinite;
    }

    @keyframes shoulder-roll {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(0, -4px); } /* Up */
      50%  { transform: translate(-2px, 0); } /* Back (simulated by slight shift) */
      75%  { transform: translate(0, 4px); }  /* Down */
      100% { transform: translate(0, 0); }
    }
  </style>

  <g id="body">
    <ellipse id="head" cx="100" cy="50" rx="20" ry="25" class="limb"/>
    <circle id="neck" cx="100" cy="80" r="5" class="joint"/>
    <path id="chest" d="M70 85 h60 l-10 60 h-40 z" class="limb"/>
    <path id="pelvis" d="M75 150 h50 l-5 30 h-40 z" class="limb"/>
  </g>

  <g id="arm-right" class="animate-shoulders">
    <circle id="shoulder-r" cx="135" cy="100" r="7" class="joint"/>
    <rect id="arm-r" x="130" y="105" width="10" height="75" rx="5" class="limb"/>
  </g>

  <g id="arm-left" class="animate-shoulders">
    <circle id="shoulder-l" cx="65" cy="100" r="7" class="joint"/>
    <rect id="arm-l" x="60" y="105" width="10" height="75" rx="5" class="limb"/>
  </g>
  
  <rect x="110" y="185" width="12" height="100" rx="6" class="limb"/>
  <rect x="78" y="185" width="12" height="100" rx="6" class="limb"/>
</svg>
