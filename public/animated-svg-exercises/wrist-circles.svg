<svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg" class="stretching-mannequin">
  <style>
    .joint { fill: #555; }
    .limb { fill: #ddd; stroke: #999; stroke-width: 2; }

    .hand-r { transform-origin: 155px 210px; animation: circle-r 2s linear infinite; }
    .hand-l { transform-origin: 45px 210px; animation: circle-l 2s linear infinite reverse; }

    @keyframes circle-r {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(6px, -6px); }
      50%  { transform: translate(0, -12px); }
      75%  { transform: translate(-6px, -6px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes circle-l {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-6px, -6px); }
      50%  { transform: translate(0, -12px); }
      75%  { transform: translate(6px, -6px); }
      100% { transform: translate(0, 0); }
    }
  </style>

  <!-- Head & torso -->
  <ellipse cx="100" cy="50" rx="20" ry="25" class="limb"/>
  <circle cx="100" cy="80" r="5" class="joint"/>
  <path d="M70 85 h60 l-10 60 h-40 z" class="limb"/>
  <path d="M75 150 h50 l-5 30 h-40 z" class="limb"/>

  <!-- Legs -->
  <rect x="78" y="185" width="12" height="100" rx="6" class="limb"/>
  <rect x="110" y="185" width="12" height="100" rx="6" class="limb"/>

  <!-- Arms extended forward -->
  <circle cx="135" cy="100" r="7" class="joint"/>
  <rect x="140" y="100" width="55" height="10" rx="5" class="limb" transform="rotate(20 140 105)"/>
  <circle cx="155" cy="210" r="0" class="joint"/>

  <circle cx="65" cy="100" r="7" class="joint"/>
  <rect x="5" y="100" width="55" height="10" rx="5" class="limb" transform="rotate(-20 60 105)"/>

  <!-- Hands (animated circles) -->
  <g class="hand-r">
    <ellipse cx="155" cy="210" rx="6" ry="8" class="limb"/>
  </g>
  <g class="hand-l">
    <ellipse cx="45" cy="210" rx="6" ry="8" class="limb"/>
  </g>
</svg>
