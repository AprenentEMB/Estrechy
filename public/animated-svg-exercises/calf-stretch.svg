<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg" class="stretching-mannequin">
  <style>
    .joint { fill: #555; }
    .limb { fill: #ddd; stroke: #999; stroke-width: 2; }
    .wall { fill: #eee; stroke: #ccc; stroke-width: 2; }

    .lean { animation: lean-in 5s ease-in-out infinite; transform-origin: 150px 380px; }

    @keyframes lean-in {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-4deg); }
    }
  </style>

  <!-- Wall -->
  <rect x="50" y="20" width="10" height="370" class="wall"/>

  <!-- Floor -->
  <line x1="30" y1="380" x2="280" y2="380" stroke="#eee" stroke-width="4" stroke-linecap="round"/>

  <g class="lean">
    <!-- Back leg (stretching calf) -->
    <rect x="168" y="280" width="12" height="100" rx="6" class="limb" transform="rotate(15 174 280)"/>
    <circle cx="174" cy="280" r="6" class="joint"/>
    <rect x="155" y="220" width="12" height="65" rx="6" class="limb" transform="rotate(10 161 220)"/>
    <circle cx="161" cy="220" r="6" class="joint"/>

    <!-- Front leg (bent) -->
    <rect x="110" y="300" width="12" height="80" rx="6" class="limb"/>
    <circle cx="116" cy="300" r="5" class="joint"/>
    <rect x="105" y="230" width="12" height="75" rx="6" class="limb" transform="rotate(-15 111 230)"/>
    <circle cx="116" cy="225" r="6" class="joint"/>

    <!-- Torso leaning forward -->
    <path d="M100 140 h50 l-5 80 h-35 z" class="limb" transform="rotate(-12 125 180)"/>
    <path d="M105 215 h40 l-5 20 h-30 z" class="limb"/>
    <circle cx="125" cy="135" r="5" class="joint"/>
    <ellipse cx="122" cy="112" rx="18" ry="22" class="limb"/>

    <!-- Arms on wall -->
    <rect x="65" y="115" width="8" height="55" rx="4" class="limb" transform="rotate(-70 69 115)"/>
    <rect x="75" y="120" width="8" height="55" rx="4" class="limb" transform="rotate(-70 79 120)"/>
  </g>
</svg>
