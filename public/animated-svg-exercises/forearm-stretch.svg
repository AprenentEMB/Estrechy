<svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg" class="stretching-mannequin">
  <style>
    .joint { fill: #555; }
    .limb { fill: #ddd; stroke: #999; stroke-width: 2; }

    .right-hand { transform-origin: 160px 170px; animation: pull-fingers-r 6s ease-in-out infinite; }
    .left-pull { animation: pull-motion 6s ease-in-out infinite; }

    @keyframes pull-fingers-r {
      0%, 10%, 90%, 100% { transform: rotate(0deg); }
      30%, 70% { transform: rotate(-40deg); }
    }
    @keyframes pull-motion {
      0%, 10%, 90%, 100% { transform: translateY(0); }
      30%, 70% { transform: translateY(-5px); }
    }
  </style>

  <!-- Head & torso -->
  <ellipse cx="100" cy="50" rx="20" ry="25" class="limb"/>
  <circle cx="100" cy="80" r="5" class="joint"/>
  <path d="M70 85 h60 l-10 60 h-40 z" class="limb"/>
  <path d="M75 150 h50 l-5 30 h-40 z" class="limb"/>

  <!-- Legs -->
  <rect x="78" y="185" width="12" height="100" rx="6" class="limb"/>
  <rect x="110" y="185" width="12" height="100" rx="6" class="limb"/>

  <!-- Right arm extended (palm up) -->
  <circle cx="135" cy="100" r="7" class="joint"/>
  <rect x="130" y="100" width="10" height="70" rx="5" class="limb"/>
  <circle cx="135" cy="170" r="5" class="joint"/>
  <g class="right-hand">
    <rect x="130" y="170" width="10" height="25" rx="5" class="limb"/>
  </g>

  <!-- Left arm (pulling fingers) -->
  <circle cx="65" cy="100" r="7" class="joint"/>
  <g class="left-pull">
    <rect x="60" y="100" width="10" height="55" rx="5" class="limb" transform="rotate(25 65 100)"/>
    <ellipse cx="120" cy="185" rx="8" ry="6" fill="#ddd" stroke="#999" stroke-width="1.5"/>
  </g>
</svg>
