<svg viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg" class="stretching-mannequin">
  <style>
    .joint { fill: #555; }
    .limb { fill: #ddd; stroke: #999; stroke-width: 2; }

    .right-forearm {
      transform-origin: 120px 60px;
      animation: bend-behind 6s ease-in-out infinite;
    }
    .left-arm-push {
      transform-origin: 65px 100px;
      animation: push-elbow 6s ease-in-out infinite;
    }

    @keyframes bend-behind {
      0%, 10%, 90%, 100% { transform: rotate(0deg); }
      30%, 70% { transform: rotate(140deg); }
    }
    @keyframes push-elbow {
      0%, 10%, 90%, 100% { transform: rotate(-30deg); }
      30%, 70% { transform: rotate(-80deg); }
    }
  </style>

  <!-- Head & torso -->
  <ellipse cx="100" cy="50" rx="20" ry="25" class="limb"/>
  <circle cx="100" cy="80" r="5" class="joint"/>
  <path d="M70 85 h60 l-10 60 h-40 z" class="limb"/>
  <path d="M75 150 h50 l-5 30 h-40 z" class="limb"/>

  <!-- Legs -->
  <rect x="78" y="185" width="12" height="100" rx="6" class="limb"/>
  <rect x="110" y="185" width="12" height="100" rx="6" class="limb"/>

  <!-- Right arm (raised, forearm bends behind head) -->
  <circle cx="135" cy="100" r="7" class="joint"/>
  <rect x="115" y="60" width="10" height="45" rx="5" class="limb"/>
  <circle cx="120" cy="60" r="5" class="joint"/>
  <g class="right-forearm">
    <rect x="115" y="20" width="10" height="45" rx="5" class="limb"/>
  </g>

  <!-- Left arm (pushing elbow) -->
  <g class="left-arm-push">
    <circle cx="65" cy="100" r="7" class="joint"/>
    <rect x="60" y="60" width="10" height="50" rx="5" class="limb"/>
  </g>
</svg>
