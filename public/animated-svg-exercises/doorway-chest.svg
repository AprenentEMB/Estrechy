<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg" class="stretching-mannequin">
  <style>
    .joint { fill: #555; }
    .limb { fill: #ddd; stroke: #999; stroke-width: 2; }
    .door { fill: none; stroke: #ccc; stroke-width: 3; }

    .step-through {
      animation: step-forward 6s ease-in-out infinite;
    }

    @keyframes step-forward {
      0%, 10%, 90%, 100% { transform: translateX(0); }
      30%, 70% { transform: translateX(15px); }
    }
  </style>

  <!-- Doorway frame -->
  <line x1="80" y1="20" x2="80" y2="380" class="door"/>
  <line x1="220" y1="20" x2="220" y2="380" class="door"/>
  <line x1="80" y1="20" x2="220" y2="20" class="door"/>

  <!-- Floor -->
  <line x1="30" y1="380" x2="270" y2="380" stroke="#eee" stroke-width="4" stroke-linecap="round"/>

  <g class="step-through">
    <!-- Torso -->
    <ellipse cx="150" cy="100" rx="18" ry="22" class="limb"/>
    <circle cx="150" cy="128" r="5" class="joint"/>
    <path d="M120 132 h60 l-10 60 h-40 z" class="limb"/>
    <path d="M125 196 h50 l-5 30 h-40 z" class="limb"/>

    <!-- Legs -->
    <rect x="128" y="230" width="12" height="100" rx="6" class="limb" transform="rotate(-8 134 230)"/>
    <rect x="160" y="230" width="12" height="100" rx="6" class="limb" transform="rotate(8 166 230)"/>

    <!-- Arms on doorframe (bent at 90 degrees) -->
    <circle cx="85" cy="148" r="7" class="joint"/>
    <rect x="76" y="100" width="10" height="50" rx="5" class="limb"/>
    <rect x="76" y="60" width="10" height="45" rx="5" class="limb" transform="rotate(-90 81 100)"/>

    <circle cx="215" cy="148" r="7" class="joint"/>
    <rect x="210" y="100" width="10" height="50" rx="5" class="limb"/>
    <rect x="210" y="60" width="10" height="45" rx="5" class="limb" transform="rotate(90 215 100)"/>
  </g>
</svg>
